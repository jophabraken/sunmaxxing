name: Build and deploy

# What this does:
#   - On every push to main: deploys current repo to Cloudflare Pages.
#   - Nightly at 03:40 UTC (~05:40 Berlin summer): re-bakes OSM data from
#     Overpass, commits any changes, then deploys.
#   - Manual "Run workflow" button: same as nightly — bake + deploy.
#
# One workflow, no drag-drop. Push or wait, and the site updates.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with "Cloudflare Pages: Edit"
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account ID (visible in dashboard URL)
#
# Required repo permission:
#   Settings → Actions → General → Workflow permissions: Read and write
#   (so the baker can commit refreshed data/ files back to main)

on:
  push:
    branches: [main]
  schedule:
    # 03:40 UTC daily. Off the hour on purpose.
    - cron: '40 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 45m gives the expanded Berlin BBOX (inner Mitte + Charlottenburg,
    # Wilmersdorf, Neukölln south, Schöneberg…) enough room — Overpass
    # can be slow, and bakeWindows scales with venue count × buildings.
    timeout-minutes: 45
    steps:
      - name: Check out repo
        # fetch-depth: 2 lets us see what the push changed (for the
        # "rebake when the baker itself changes" check below).
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Bake on cron / manual runs, or if data/ is missing on any run, OR
      # if this push touched the baker or the BBOX in index.html — those
      # changes invalidate the deployed data, so we want fresh bundles out
      # the door, not tomorrow morning's.
      - name: Decide whether to bake
        id: decide
        run: |
          bake=false
          if [ "${{ github.event_name }}" = "schedule" ] \
             || [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             || [ ! -f data/venues.json ]; then
            bake=true
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            if git diff --name-only HEAD~1 HEAD \
                | grep -E '^(scripts/bake-data\.js|\.github/workflows/bake-data\.yml)$' > /dev/null; then
              echo "Push changed the baker itself — forcing a rebake."
              bake=true
            fi
          fi
          echo "bake=$bake" >> $GITHUB_OUTPUT
          echo "Decision: bake=$bake"

      - name: Install bake dependencies
        if: steps.decide.outputs.bake == 'true'
        run: npm install --no-audit --no-fund

      - name: Run baker
        if: steps.decide.outputs.bake == 'true'
        run: node scripts/bake-data.js

      # Fail loud if the baker silently skipped windows-today.json (e.g. an
      # uncaught exception inside bakeWindows). Without this, the site deploys
      # cleanly but every visitor hits the 15s client-side shadow compute
      # fallback and we only find out from user complaints.
      - name: Assert required bake outputs exist
        if: steps.decide.outputs.bake == 'true'
        run: |
          missing=0
          for f in data/venues.json data/buildings.json data/windows-today.json data/rooftops-today.json data/manifest.json; do
            if [ ! -s "$f" ]; then
              echo "::error::required bake output missing or empty: $f"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "::error::bake completed but produced no usable output — refusing to commit/deploy"
            exit 1
          fi
          echo "All required bake outputs present."

      - name: Show output sizes
        if: steps.decide.outputs.bake == 'true'
        run: |
          ls -lh data/ || true
          echo "---"
          cat data/manifest.json || true

      - name: Commit refreshed data if changed
        if: steps.decide.outputs.bake == 'true'
        run: |
          git config user.name  "sunmaxxing-baker"
          git config user.email "noreply@sunmaxxing.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore(data): bake $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      # If the bake itself failed, reset data/ to the last committed state so
      # we don't ship half-baked or partial JSON. Then let the deploy still run
      # — the graceful-stale windows loader in index.html accepts up to a
      # 7-day-old bake, so shipping today's code changes with yesterday's data
      # is strictly better than blocking the deploy entirely and leaving every
      # visitor on the 15s client-side fallback.
      - name: Reset data/ on bake failure
        if: failure() && steps.decide.outputs.bake == 'true'
        run: |
          echo "::warning::bake failed — reverting data/ to last committed state and shipping code-only deploy"
          git checkout -- data/ || true
          ls -lh data/ || true

      - name: Deploy to Cloudflare Pages
        # Run even if bake failed — see Reset step above.
        if: ${{ !cancelled() }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=sunmaxxing --branch=main --commit-dirty=true
