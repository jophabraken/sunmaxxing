<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Sunmaxxing">
  <!-- Warm circular backdrop so the sun reads on any browser UI color -->
  <circle cx="32" cy="32" r="32" fill="#FFF4D6"/>
  <!-- Sun rays -->
  <g stroke="#F5A623" stroke-width="3.2" stroke-linecap="round">
    <line x1="32" y1="8"  x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="56"/>
    <line x1="8"  y1="32" x2="14" y2="32"/>
    <line x1="50" y1="32" x2="56" y2="32"/>
    <line x1="15" y1="15" x2="19" y2="19"/>
    <line x1="45" y1="45" x2="49" y2="49"/>
    <line x1="15" y1="49" x2="19" y2="45"/>
    <line x1="45" y1="19" x2="49" y2="15"/>
  </g>
  <!-- Sun disc -->
  <circle cx="32" cy="32" r="12" fill="#FFB627" stroke="#F5A623" stroke-width="1.6"/>
</svg>
